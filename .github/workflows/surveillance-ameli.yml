
name: Surveillance Ameli.fr

on:
  schedule:
    - cron: '0 8 * * 1'  # Chaque lundi à 8h UTC
  workflow_dispatch:       # Lancement manuel possible

jobs:
  surveiller:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Vérifier les tarifs ameli.fr
        run: |
          python3 << 'PYEOF'
          import urllib.request
          import hashlib
          import smtplib
          import os
          import json
          from email.mime.text import MIMEText
          from email.mime.multipart import MIMEMultipart

          PAGES = [
            "https://www.ameli.fr/assure/remboursements/rembourse/consultations-telemedecine/metropole",
            "https://www.ameli.fr/medecin/exercice-liberal/facturation-remuneration/consultations-actes/tarifs/tarifs-conventionnels-medecins-generalistes-specialistes",
            "https://www.ameli.fr/assure/actualites/acces-aux-soins-prevention-suivi-medical-ce-qui-change-pour-les-assures-en-2026",
          ]

          HASH_FILE = "ameli_hashes.json"

          try:
            with open(HASH_FILE, 'r') as f:
              old_hashes = json.load(f)
          except:
            old_hashes = {}

          changements = []
          new_hashes = {}
          headers = {'User-Agent': 'Mozilla/5.0 (compatible; SimulSante-Monitor/1.0)'}

          for url in PAGES:
            try:
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=15) as r:
                content = r.read()
                h = hashlib.md5(content).hexdigest()
                new_hashes[url] = h
                if url in old_hashes and old_hashes[url] != h:
                  changements.append(url)
            except Exception as e:
              print(f"Erreur {url}: {e}")

          with open(HASH_FILE, 'w') as f:
            json.dump(new_hashes, f)

          if changements:
            msg = MIMEMultipart()
            msg['From'] = os.environ['YAHOO_USER']
            msg['To'] = 'simulsante@yahoo.com'
            msg['Subject'] = "⚠️ Simul'Santé — Changement détecté sur ameli.fr"

            body = "Bonjour,\n\nLes pages suivantes ont été modifiées sur ameli.fr :\n\n"
            for url in changements:
              body += f"• {url}\n"
            body += "\nVérifiez si des tarifs ont changé et mettez à jour le simulateur.\n\nSimul'Santé Monitor 🤖"

            msg.attach(MIMEText(body, 'plain', 'utf-8'))

            with smtplib.SMTP_SSL('smtp.mail.yahoo.com', 465) as server:
              server.login(os.environ['YAHOO_USER'], os.environ['YAHOO_PASS'])
              server.send_message(msg)
            print("Email envoyé !")
          else:
            print("Aucun changement détecté.")
          PYEOF

      - name: Sauvegarder les hashes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Mise à jour hashes surveillance ameli.fr"
          file_pattern: ameli_hashes.json
