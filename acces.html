<title>Simul'Santé — Accès sécurisé</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#f7f8fc;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.card{background:#fff;border:1px solid #e4e7f0;border-radius:16px;padding:48px 40px;max-width:420px;width:100%;box-shadow:0 8px 32px rgba(15,17,23,.08);text-align:center}
.logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:32px}
.logo-text{font-size:18px;font-weight:700;color:#0f1117;letter-spacing:-.5px}
.logo-text span{color:#6366f1}
.badge{display:inline-flex;align-items:center;gap:6px;background:#fff7ed;border:1px solid #fed7aa;color:#c2410c;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:5px 12px;border-radius:100px;margin-bottom:24px}
.badge-dot{width:6px;height:6px;background:#f97316;border-radius:50%;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
h1{font-size:20px;font-weight:700;color:#0f1117;margin-bottom:8px}
.sub{font-size:13.5px;color:#4a5068;line-height:1.6;margin-bottom:32px}
.form-group{margin-bottom:16px;text-align:left}
.form-label{display:block;font-size:11px;font-weight:700;color:#9299b0;text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}
.form-input{width:100%;background:#f7f8fc;border:1.5px solid #e4e7f0;border-radius:10px;padding:13px 48px 13px 16px;font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;color:#0f1117;outline:none;transition:all .18s;letter-spacing:2px;text-align:center}
.form-input:focus{border-color:#ec4899;background:#fdf2f8;box-shadow:0 0 0 3px rgba(236,72,153,.08)}
.btn{width:100%;background:#ec4899;color:#fff;border:none;border-radius:10px;padding:14px;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .18s;margin-top:4px}
.btn:hover{background:#db2777;box-shadow:0 6px 20px rgba(99,102,241,.35)}
.btn:disabled{opacity:.6;cursor:not-allowed}
.error{display:none;background:#fef2f2;border:1px solid #fca5a5;border-radius:8px;padding:12px;font-size:13px;color:#991b1b;font-weight:600;margin-top:14px}
.error.show{display:block}
.note{font-size:11.5px;color:#9299b0;margin-top:20px;line-height:1.6}
.eye-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#9299b0;padding:0;line-height:1;display:flex;align-items:center}
</style>

  <h1>Entrez votre code d'acc&egrave;s</h1>
  <p class="sub">Ce lien vous a &eacute;t&eacute; transmis personnellement. Entrez le code re&ccedil;u pour acc&eacute;der au simulateur.</p>
  <div class="form-group">
    <label class="form-label">Code d'acc&egrave;s</label>
    <div style="position:relative">
      <input class="form-input" type="password" id="pwd" placeholder="" autocomplete="off" onkeydown="if(event.key==='Enter')check()">
      <button type="button" class="eye-btn" onclick="togglePwd()">
        <svg id="eye-open" style="display:none" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>

  <p class="note">Acc&egrave;s valable 24h &middot; Usage personnel uniquement</p>
</div>
<script>
async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function check() {
  const pwd = document.getElementById('pwd').value.trim();
  const btn = document.getElementById('btn');
  const err = document.getElementById('error');
  if (!pwd) return;
  btn.disabled = true;
  btn.textContent = 'Vérification...';
  err.classList.remove('show');
  const hash = await sha256(pwd);
  const testUrl = './sim-' + hash + '.html';
  try {
    const res = await fetch(testUrl, { method: 'HEAD' });
    if (res.ok) {
      window.location.href = testUrl;
    } else {
      err.classList.add('show');
      document.getElementById('pwd').value = '';
      btn.disabled = false;
      btn.textContent = 'Accéder au simulateur →';
    }
  } catch(e) {
    err.classList.add('show');
    document.getElementById('pwd').value = '';
    btn.disabled = false;
    btn.textContent = 'Accéder au simulateur →';
  }
}

function togglePwd() {
  const input = document.getElementById('pwd');
  const eyeOpen = document.getElementById('eye-open');
  const eyeClosed = document.getElementById('eye-closed');
  if (input.type === 'password') {
    input.type = 'text';
    eyeOpen.style.display = 'block';
    eyeClosed.style.display = 'none';
  } else {
    input.type = 'password';
    eyeOpen.style.display = 'none';
    eyeClosed.style.display = 'block';
  }
}
</script>
